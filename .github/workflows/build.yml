name: Build Binary

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Linux x86_64 musl

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build binary
        run: cargo build --release --locked --target x86_64-unknown-linux-musl

      - name: Package Linux binary (Tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd target/x86_64-unknown-linux-musl/release
          tar -czf txdx-linux-x86_64-musl.tar.gz txdx

      - name: Upload Linux artifact (Tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: txdx-linux-x86_64-musl
          path: target/x86_64-unknown-linux-musl/release/txdx-linux-x86_64-musl.tar.gz
          retention-days: 30

      - name: Upload Linux artifact (Non-Tag)
        if: '!startsWith(github.ref, ''refs/tags/v'')'
        uses: actions/upload-artifact@v4
        with:
          name: txdx-linux-x86_64-musl
          path: target/x86_64-unknown-linux-musl/release/txdx
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    name: Create Release
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Display artifact structure
        run: ls -R artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Automated release for version ${{ github.ref_name }}

            ## 下载
            - **Linux x86_64 musl**: txdx-linux-x86_64-musl.tar.gz
          draft: false
          prerelease: false
          files: |
            artifacts/txdx-linux-x86_64-musl/txdx-linux-x86_64-musl.tar.gz
